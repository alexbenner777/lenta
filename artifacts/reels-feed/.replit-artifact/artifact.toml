kind = "web"
previewPath = "/"
title = "Reels Feed"
version = "1.0.0"
id = "artifacts/reels-feed"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22742

[services.development]
run = "pnpm --filter @workspace/reels-feed run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/reels-feed", "run", "build" ]
publicDir = "artifacts/reels-feed/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22742"
BASE_PATH = "/"
